name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_heavy_tests:
        description: "Run simulation/performance stress tests"
        required: false
        type: boolean
        default: false

jobs:
  go-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        go-version: ['1.22.5', '1.23.0']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ matrix.go-version }}-${{ hashFiles('**/go.sum') }}
      - name: go version
        run: go version
      - name: validate go version
        shell: bash
        run: |
          goversion="$(go env GOVERSION)"
          echo "Detected: ${goversion}"
          expected="go${{ matrix.go-version }}"
          if [ "${goversion}" != "${expected}" ]; then
            echo "Expected ${expected}, got ${goversion}"
            exit 1
          fi
      - name: go mod tidy
        run: go mod tidy
      - name: Verify tidy is clean
        shell: bash
        run: git diff --exit-code go.mod go.sum
      - name: go build
        run: go build ./...
      - name: go test
        run: go test ./...
      - name: go test (outside tag)
        run: go test -tags outside ./...
      - name: go vet
        run: go vet ./...
      - name: go vet (outside tag)
        run: go vet -tags outside ./...
      - name: gofmt check
        shell: bash
        run: |
          files="$(gofmt -l .)"
          if [ -n "$files" ]; then
            echo "gofmt needed on:"
            echo "$files"
            exit 1
          fi
      - name: build cmd/inside
        run: go build -tags inside ./cmd/inside
      - name: build cmd/outside
        run: go build -tags outside ./cmd/outside
      - name: outside flow smoke tests
        run: go test ./tests/integration -run TestOutside -count=1 -v
      - name: linux mvp smoke test
        if: runner.os == 'Linux'
        run: go test ./tests/integration -run TestInsideLinuxMVP -count=1 -v

  website:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: website/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build static export
        run: npm run build

  heavy-sim-perf:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_heavy_tests }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22.5'
      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-1.22.5-${{ hashFiles('**/go.sum') }}
      - name: go version
        run: go version
      - name: validate go version
        shell: bash
        run: |
          goversion="$(go env GOVERSION)"
          echo "Detected: ${goversion}"
          case "${goversion}" in
            go1.22.5) ;;
            *)
              echo "Expected Go 1.22.5, got ${goversion}"
              exit 1
              ;;
          esac
      - name: Run censorship matrix
        run: go test ./tests/simulation -run TestCensorshipSimulationScenarioMatrix_64Scenarios -count=1
      - name: Run latency and stability gates
        run: go test -tags perf ./tests/performance -run "TestDecisionLatencyP95_Under5s|TestRotationStability_1000Switches_NoPanic" -count=1
